name: Update stock data

# 매일(평일) 시세를 받아 data.json 을 갱신한다.
on:
  schedule:
    # 09:30 UTC = 18:30 KST (KRX 마감 15:30 이후, 데이터 안정화 후)
    - cron: '30 9 * * 1-5'
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 허용

permissions:
  contents: write          # data.json 커밋/푸시 권한

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch & compute stock data
        run: python scripts/update_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No change in data.json — skipping commit."
          else
            git add data.json
            git commit -m "chore: update stock data ($(date -u +%Y-%m-%d))"
            git push
          fi
